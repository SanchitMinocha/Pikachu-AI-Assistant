# SanchitAI – Apache VirtualHost Configuration
#
# Two deployment options:
#
# Option A: mod_wsgi (runs Flask directly in Apache process)
#   sudo apt install libapache2-mod-wsgi-py3
#   sudo a2enmod wsgi
#
# Option B: Reverse proxy to Gunicorn (recommended for production)
#   sudo apt install gunicorn
#   Run: gunicorn -w 2 -b 127.0.0.1:5050 wsgi:application
#   sudo a2enmod proxy proxy_http
#
# Place this file at: /etc/apache2/sites-available/sanchit-ai.conf
# Enable with: sudo a2ensite sanchit-ai && sudo systemctl reload apache2

# ===================================================================
# OPTION A: mod_wsgi (simpler, no separate Gunicorn process)
# ===================================================================

<VirtualHost *:80>
    ServerName sanchitai.yourdomain.com
    # OR use a path on your existing server:
    # ServerName yourserver.com

    # Project directory
    DocumentRoot /var/www/html/scb

    # WSGI configuration
    WSGIDaemonProcess sanchitai \
        python-path=/var/www/html/scb \
        python-home=/var/www/html/scb/venv \
        processes=2 \
        threads=4 \
        display-name=%{GROUP}

    WSGIProcessGroup sanchitai
    WSGIApplicationGroup %{GLOBAL}

    # Mount the API at /scb/api/ (so it works alongside your other apps)
    WSGIScriptAlias /scb/api /var/www/html/scb/wsgi.py

    <Directory /var/www/html/scb>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    # CORS headers (backup — Flask also handles this)
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type, X-API-Key"

    # Handle OPTIONS preflight
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule .* - [R=204,L]

    ErrorLog ${APACHE_LOG_DIR}/sanchitai_error.log
    CustomLog ${APACHE_LOG_DIR}/sanchitai_access.log combined
</VirtualHost>


# ===================================================================
# OPTION B: Reverse proxy to Gunicorn (recommended for production)
# ===================================================================
# Uncomment and use this block instead of Option A if using Gunicorn:

# <VirtualHost *:80>
#     ServerName sanchitai.yourdomain.com
#
#     # Proxy all /api/ requests to Gunicorn
#     ProxyPreserveHost On
#     ProxyPass /scb/api/ http://127.0.0.1:5050/api/
#     ProxyPassReverse /scb/api/ http://127.0.0.1:5050/api/
#
#     # CORS headers
#     Header always set Access-Control-Allow-Origin "*"
#     Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS"
#     Header always set Access-Control-Allow-Headers "Content-Type, X-API-Key"
#
#     RewriteEngine On
#     RewriteCond %{REQUEST_METHOD} OPTIONS
#     RewriteRule .* - [R=204,L]
#
#     ErrorLog ${APACHE_LOG_DIR}/sanchitai_error.log
#     CustomLog ${APACHE_LOG_DIR}/sanchitai_access.log combined
# </VirtualHost>


# ===================================================================
# Gunicorn systemd service (for Option B)
# Save as: /etc/systemd/system/sanchitai.service
# ===================================================================
#
# [Unit]
# Description=SanchitAI Gunicorn Service
# After=network.target
#
# [Service]
# User=www-data
# Group=www-data
# WorkingDirectory=/var/www/html/scb
# Environment="PATH=/var/www/html/scb/venv/bin"
# EnvironmentFile=/var/www/html/scb/.env
# ExecStart=/var/www/html/scb/venv/bin/gunicorn \
#     --workers 2 \
#     --bind 127.0.0.1:5050 \
#     --timeout 120 \
#     --log-file /var/www/html/scb/logs/gunicorn.log \
#     wsgi:application
# Restart=always
#
# [Install]
# WantedBy=multi-user.target
#
# Enable: sudo systemctl enable sanchitai && sudo systemctl start sanchitai
